<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portofolio - Salsabila Shafa Aditya</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Kotakan untuk portofolio khusus di halaman ini */
        .portfolio {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: #0f172a; /* Sesuaikan dengan tema gelap jika ada */
        }

        .portfolio-item {
            flex: 1 1 30%;
            max-width: 300px;
            background-color: #0e6bbd;
            border: 2px solid #38bdf8;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        .portfolio-item img {
            width: 100%;
            border-radius: 8px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #38bdf8;
            color: white;
            border-radius: 10px 10px 0 0;
            margin-top: 40px;
        }
    </style>
</head>
