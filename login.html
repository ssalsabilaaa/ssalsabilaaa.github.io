<!DOCTYPE html>
<html>
<head>
    <title>Halaman Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, thistle, #b5b7b8);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgb(255, 255, 255);
            width: 350px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h1 {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Tombol di tengah */
        .login {
            background-color: thistle;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login:hover {
            background-color: #f7f7f8;
            color: black;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-box button {
            margin-top: 15px;
            padding: 8px 20px;
            border: none;
            background: thistle;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .modal-box button:hover {
            background: #777;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h1>LOGIN</h1>

    <form id="loginForm" onsubmit="return loginBerhasil()">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button type="submit" class="login">Login</button>
    </form>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2>Login Berhasil!</h2>
        <button onclick="tutupModal()">OK</button>
    </div>
</div>

<script>
function loginBerhasil() {
    document.getElementById("modal").style.display = "flex";
    return false;
}

function tutupModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("loginForm").reset();
}
</script>

</body>
</html>
